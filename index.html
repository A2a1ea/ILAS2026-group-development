<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lantern Dash</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell" aria-label="Lantern Dash browser game">
      <section class="hud" aria-label="Game status">
        <div>
          <span class="label">Score</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span class="label">Time</span>
          <strong id="time">45</strong>
        </div>
        <div>
          <span class="label">Best</span>
          <strong id="best">0</strong>
        </div>
      </section>

      <section class="stage-wrap">
        <canvas id="game" width="960" height="540" aria-label="Lantern Dash play field"></canvas>
        <div class="overlay" id="overlay">
          <h1>Lantern Dash</h1>
          <p>Collect knowledge stars, dodge drifting shadows, and keep the lantern glowing.</p>
          <button id="startButton" type="button">Start Game</button>
          <p class="hint">Move with WASD, arrow keys, mouse, or touch.</p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
